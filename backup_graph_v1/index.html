<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta http-equiv="refresh" content="10">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Trativod</title>

<style>

body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 30px;
}

.value {
    font-size: 60px;
    font-weight: bold;
}

.status {
    font-size: 40px;
    margin: 20px;
}

button {
    font-size: 24px;
    padding: 15px;
    min-width: 280px;
}

</style>

</head>

<body>

<h1>Trativod</h1>

<h2>Aktuální hladina</h2>

<div class="value">
    {{ level_cm }} cm
</div>

<h2>Čerpadlo</h2>

<div class="status">

{% if pump_state == "ON" %}
🔴 ZAPNUTO
{% else %}
🟢 VYPNUTO
{% endif %}

</div>

<a href="/pump/toggle">
    <button id="pumpButton">

        {% if pump_state == "ON" %}
        Vypnout
        {% else %}
        Zapnout čerpadlo
        {% endif %}

    </button>
</a>

<br><br>

<h2>Režim</h2>

<div class="status">

{% if auto_mode == "1" %}
🟢 AUTO
{% else %}
⚪ MANUAL
{% endif %}

</div>

<a href="/auto/toggle">
    <button>
        AUTO ON/OFF
    </button>
</a>

<script>

let remaining = {{ remaining_seconds }};

function updateButton() {

    const btn = document.getElementById("pumpButton");

    if (!btn) {
        return;
    }

    if (remaining <= 0) {
        return;
    }

    const minutes = Math.floor(remaining / 60);
    const seconds = remaining % 60;

    btn.innerText =
        "Vypnout (" +
        String(minutes).padStart(2, "0") +
        ":" +
        String(seconds).padStart(2, "0") +
        ")";

    remaining--;
}

updateButton();
setInterval(updateButton, 1000);

</script>

</body>
</html>
