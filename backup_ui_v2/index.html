<!DOCTYPE html>

<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="10">
    <title>Trativod</title>

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<style>
    body {
        font-family: Arial;
        text-align: center;
        margin-top: 40px;
    }

    .value {
        font-size: 60px;
        font-weight: bold;
    }
</style>

</head>
<body>

<h1>Trativod</h1>

<h2>Aktuální hladina</h2>

<div class="value">
    {{ level_cm }} cm
</div>

<h2>Čerpadlo</h2>

<div style="font-size:40px">

{% if pump_state == "ON" %}
🟢 ZAPNUTO
{% else %}
🔴 VYPNUTO
{% endif %}

</div>

<h2>Režim</h2>

<div style="font-size:40px">

{% if auto_mode == "1" %}
🟢 AUTO
{% else %}
⚪ MANUAL
{% endif %}

</div>

<br>

<a href="/auto/toggle">
    <button style="font-size:24px;padding:15px;">
        AUTO ON/OFF
    </button>
</a>

<br><br>

<a href="/pump/on">
    <button style="font-size:24px;padding:15px;">
        Zapnout čerpadlo
    </button>
</a>

<a href="/pump/off">
    <button style="font-size:24px;padding:15px;">
        Vypnout čerpadlo
    </button>
</a>

</body>
</html>
